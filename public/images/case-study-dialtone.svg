<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Rebuilding Dialtone — case study illustration -->
  <!-- Left: type scale | Right: UI components -->
  <!-- Colors: Dialtone purple palette (#6c3dff primary, #10022C deep, #D4BCFF Melrose) -->

  <!-- ── Background ── -->
  <rect width="800" height="500" fill="#f5f2ff"/>

  <!-- ── Grid lines ── -->
  <g stroke="rgba(16,2,44,0.055)" stroke-width="0.7">
    <line x1="80"  y1="0" x2="80"  y2="500"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="240" y1="0" x2="240" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="560" y1="0" x2="560" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
    <line x1="720" y1="0" x2="720" y2="500"/>
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
  </g>

  <!-- ── Column divider ── -->
  <line x1="358" y1="36" x2="358" y2="464" stroke="rgba(16,2,44,0.09)" stroke-width="0.7"/>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- LEFT COLUMN — TYPE SCALE (x: 40–340)             -->
  <!-- ══════════════════════════════════════════════════ -->

  <text x="40" y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="8" letter-spacing="1.5"
    fill="rgba(16,2,44,0.28)">TYPE SCALE</text>

  <!-- 32px ─────────────────────────────────────── -->
  <text x="40" y="87"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">32</text>
  <rect x="68" y="68" width="220" height="32" rx="2" fill="rgba(108,61,255,0.14)"/>

  <!-- 24px ─────────────────────────────────────── -->
  <text x="40" y="135"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">24</text>
  <rect x="68" y="120" width="165" height="24" rx="2" fill="rgba(108,61,255,0.12)"/>

  <!-- 20px ─────────────────────────────────────── -->
  <text x="40" y="183"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">20</text>
  <rect x="68" y="172" width="137" height="20" rx="2" fill="rgba(108,61,255,0.11)"/>

  <!-- 16px ─────────────────────────────────────── -->
  <text x="40" y="233"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">16</text>
  <rect x="68" y="224" width="110" height="16" rx="2" fill="rgba(108,61,255,0.10)"/>

  <!-- 14px ─────────────────────────────────────── -->
  <text x="40" y="284"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">14</text>
  <rect x="68" y="276" width="96" height="14" rx="2" fill="rgba(108,61,255,0.10)"/>

  <!-- 12px ─────────────────────────────────────── -->
  <text x="40" y="334"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">12</text>
  <rect x="68" y="328" width="82" height="12" rx="2" fill="rgba(108,61,255,0.09)"/>

  <!-- 11px ─────────────────────────────────────── -->
  <text x="40" y="386"
    font-family="'Courier New', Courier, monospace" font-size="8"
    fill="rgba(16,2,44,0.24)">11</text>
  <rect x="68" y="380" width="76" height="11" rx="2" fill="rgba(108,61,255,0.09)"/>

  <!-- spacing indicator: gap between 20px and 16px rows -->
  <line x1="300" y1="192" x2="300" y2="224"
    stroke="rgba(108,61,255,0.14)" stroke-width="0.7" stroke-dasharray="2,2"/>
  <line x1="296" y1="192" x2="304" y2="192"
    stroke="rgba(108,61,255,0.14)" stroke-width="0.7"/>
  <line x1="296" y1="224" x2="304" y2="224"
    stroke="rgba(108,61,255,0.14)" stroke-width="0.7"/>

  <!-- body copy simulation (paragraph lines below type scale) -->
  <rect x="68" y="420" width="218" height="7" rx="2" fill="rgba(16,2,44,0.07)"/>
  <rect x="68" y="432" width="196" height="7" rx="2" fill="rgba(16,2,44,0.07)"/>
  <rect x="68" y="444" width="152" height="7" rx="2" fill="rgba(16,2,44,0.07)"/>


  <!-- ══════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN — COMPONENTS (x: 378–760)           -->
  <!-- ══════════════════════════════════════════════════ -->

  <text x="378" y="46"
    font-family="'Courier New', Courier, monospace"
    font-size="8" letter-spacing="1.5"
    fill="rgba(16,2,44,0.28)">COMPONENTS</text>

  <!-- ── Buttons ─────────────────────────────────────── -->

  <!-- Primary (filled) -->
  <rect x="378" y="68" width="120" height="36" rx="6"
    fill="rgba(108,61,255,0.15)" stroke="rgba(108,61,255,0.22)" stroke-width="1.2"/>
  <rect x="408" y="83" width="60" height="8" rx="2" fill="rgba(108,61,255,0.30)"/>

  <!-- Outlined -->
  <rect x="514" y="68" width="110" height="36" rx="6"
    fill="none" stroke="rgba(108,61,255,0.20)" stroke-width="1.2"/>
  <rect x="541" y="83" width="56" height="8" rx="2" fill="rgba(108,61,255,0.18)"/>

  <!-- Ghost / text link -->
  <rect x="642" y="83" width="66" height="8" rx="2" fill="rgba(108,61,255,0.12)"/>
  <line x1="642" y1="93" x2="708" y2="93"
    stroke="rgba(108,61,255,0.16)" stroke-width="0.8"/>


  <!-- ── Input fields ─────────────────────────────────── -->

  <!-- Field 1 label + input -->
  <rect x="378" y="138" width="32" height="7" rx="2" fill="rgba(212,188,255,0.70)"/>
  <rect x="378" y="152" width="210" height="36" rx="8"
    fill="none" stroke="rgba(108,61,255,0.18)" stroke-width="1"/>
  <!-- Cursor -->
  <line x1="395" y1="167" x2="395" y2="182"
    stroke="rgba(108,61,255,0.42)" stroke-width="1.2"/>

  <!-- Field 2 label + select/dropdown -->
  <rect x="378" y="208" width="38" height="7" rx="2" fill="rgba(212,188,255,0.55)"/>
  <rect x="378" y="222" width="210" height="36" rx="8"
    fill="none" stroke="rgba(108,61,255,0.16)" stroke-width="1"/>
  <!-- Dropdown arrow -->
  <polyline points="562,237 568,243 574,237"
    fill="none" stroke="rgba(108,61,255,0.30)" stroke-width="1.2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Selected value placeholder -->
  <rect x="395" y="237" width="120" height="7" rx="2" fill="rgba(16,2,44,0.10)"/>


  <!-- ── Toggles (right sub-column, x≈618) ──────────── -->

  <!-- Toggles label -->
  <rect x="618" y="138" width="38" height="7" rx="2" fill="rgba(212,188,255,0.55)"/>

  <!-- Toggle ON (thumb right = active) -->
  <rect x="618" y="152" width="48" height="26" rx="13"
    fill="rgba(108,61,255,0.18)" stroke="rgba(108,61,255,0.22)" stroke-width="1"/>
  <circle cx="654" cy="165" r="9" fill="rgba(108,61,255,0.42)"/>
  <!-- ON label -->
  <rect x="673" y="161" width="36" height="7" rx="2" fill="rgba(16,2,44,0.10)"/>

  <!-- Toggle OFF (thumb left = inactive) -->
  <rect x="618" y="192" width="48" height="26" rx="13"
    fill="none" stroke="rgba(108,61,255,0.16)" stroke-width="1"/>
  <circle cx="630" cy="205" r="9" fill="rgba(108,61,255,0.10)"/>
  <!-- OFF label -->
  <rect x="673" y="201" width="36" height="7" rx="2" fill="rgba(16,2,44,0.08)"/>


  <!-- ── Radio group (below toggles) ───────────────── -->

  <!-- Radio 1 — selected -->
  <circle cx="627" cy="244" r="9"
    fill="none" stroke="rgba(108,61,255,0.22)" stroke-width="1"/>
  <circle cx="627" cy="244" r="4" fill="rgba(108,61,255,0.36)"/>
  <rect x="642" y="240" width="52" height="7" rx="2" fill="rgba(16,2,44,0.10)"/>

  <!-- Radio 2 — unselected -->
  <circle cx="627" cy="268" r="9"
    fill="none" stroke="rgba(108,61,255,0.15)" stroke-width="1"/>
  <rect x="642" y="264" width="40" height="7" rx="2" fill="rgba(16,2,44,0.08)"/>


  <!-- ── Avatars ──────────────────────────────────── -->

  <circle cx="398" cy="330" r="20"
    fill="none" stroke="rgba(108,61,255,0.18)" stroke-width="1"/>
  <circle cx="446" cy="330" r="20"
    fill="none" stroke="rgba(108,61,255,0.16)" stroke-width="1"/>
  <circle cx="494" cy="330" r="20"
    fill="rgba(212,188,255,0.22)" stroke="rgba(108,61,255,0.14)" stroke-width="1"/>
  <circle cx="542" cy="330" r="20"
    fill="none" stroke="rgba(108,61,255,0.12)" stroke-width="1"/>


  <!-- ── Chips / Badges ──────────────────────────── -->

  <!-- Chip 1 — dot + label -->
  <rect x="378" y="380" width="74" height="26" rx="13"
    fill="rgba(108,61,255,0.07)" stroke="rgba(108,61,255,0.18)" stroke-width="1"/>
  <circle cx="396" cy="393" r="4" fill="rgba(108,61,255,0.26)"/>
  <rect x="406" y="389" width="35" height="7" rx="2" fill="rgba(16,2,44,0.12)"/>

  <!-- Chip 2 — Melrose fill -->
  <rect x="462" y="380" width="86" height="26" rx="13"
    fill="rgba(212,188,255,0.22)" stroke="rgba(108,61,255,0.16)" stroke-width="1"/>
  <rect x="476" y="389" width="58" height="7" rx="2" fill="rgba(16,2,44,0.12)"/>

  <!-- Chip 3 — outlined -->
  <rect x="558" y="380" width="64" height="26" rx="13"
    fill="none" stroke="rgba(108,61,255,0.14)" stroke-width="1"/>
  <rect x="570" y="389" width="40" height="7" rx="2" fill="rgba(16,2,44,0.10)"/>

  <!-- Chip 4 — ghost + dismiss × -->
  <rect x="632" y="380" width="56" height="26" rx="13"
    fill="rgba(108,61,255,0.05)" stroke="rgba(108,61,255,0.13)" stroke-width="1"/>
  <rect x="641" y="389" width="26" height="7" rx="2" fill="rgba(16,2,44,0.10)"/>
  <line x1="674" y1="387" x2="680" y2="399"
    stroke="rgba(108,61,255,0.22)" stroke-width="1" stroke-linecap="round"/>
  <line x1="680" y1="387" x2="674" y2="399"
    stroke="rgba(108,61,255,0.22)" stroke-width="1" stroke-linecap="round"/>

</svg>
